name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install uv
        run: python -m pip install "uv>=0.11.13,<0.12"

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run lint
        run: uv run ruff check .

      - name: Run type checks
        run: uv run mypy src/llm_fight

      - name: Check console script
        run: uv run llmfight --help

      - name: Run tests
        run: uv run pytest -q --cov=llm_fight
