repos:
  - repo: local
    hooks:
      - id: uv-lock-check
        name: uv lock --check
        entry: uv lock --check
        language: system
        pass_filenames: false
      - id: ruff-format
        name: uv run ruff format
        entry: uv run ruff format
        language: system
        pass_filenames: false
      - id: ruff-check
        name: uv run ruff check --fix
        entry: uv run ruff check --fix
        language: system
        pass_filenames: false
      - id: mypy
        name: uv run mypy src/llm_fight
        entry: uv run mypy src/llm_fight
        language: system
        pass_filenames: false
      - id: pytest
        name: uv run pytest -q
        entry: uv run pytest -q
        language: system
        pass_filenames: false
        stages: [pre-push]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-added-large-files
